name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      # 'true' once Developer ID signing secrets are configured; until then the
      # release ships ad-hoc signed (no notarization) exactly as before.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_NOTARY_APPLE_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard against version drift: the DMG name + bundle version come from
      # package_app.sh, not the tag. Fail loudly if they disagree.
      - name: Verify tag matches app version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PLIST_VER="$(grep -A1 CFBundleShortVersionString scripts/package_app.sh | grep -o '[0-9][0-9.]*' | head -1)"
          echo "tag=$TAG_VER  package_app.sh=$PLIST_VER"
          if [ "$TAG_VER" != "$PLIST_VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match CFBundleShortVersionString $PLIST_VER in scripts/package_app.sh — bump it before tagging."
            exit 1
          fi

      - name: Package and Validate App Bundle
        run: scripts/test_package_app.sh

      # Ad-hoc path (no signing secrets): just build the DMG.
      - name: Build DMG (ad-hoc)
        if: env.HAS_SIGNING != 'true'
        run: scripts/make_dmg.sh

      # Notarized path (signing secrets present): Developer ID sign + notarize +
      # staple, rebuilding both the zip and DMG from the signed/stapled app.
      - name: Sign, notarize & staple (Developer ID)
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: scripts/sign_and_notarize.sh

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 cmdALL-macos.zip cmdALL-*.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cmdALL-macos.zip
            dist/cmdALL-*.dmg
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
